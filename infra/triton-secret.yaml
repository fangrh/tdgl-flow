apiVersion: v1
kind: Secret
metadata:
  name: triton-ssh-key
  namespace: tdgl
type: Opaque
stringData:
  # Replace with your actual SSH private key content
  # kubectl create secret generic triton-ssh-key --namespace=tdgl \
  #   --from-file=id_rsa=/path/to/your/ssh/key
  id_rsa: |
    REPLACE_WITH_YOUR_SSH_PRIVATE_KEY
