upstream argo {
    server argo-workflows-server.argo.svc.cluster.local:2746;
}

upstream minio {
    server minio.tdgl.svc.cluster.local:9000;
}

upstream minio_console {
    server minio.tdgl.svc.cluster.local:9001;
}

server {
    listen 80;

    # Argo Workflows Server
    location /argo/ {
        proxy_pass http://argo/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Argo SSE streams
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    # MinIO S3 API
    location /minio/ {
        proxy_pass http://minio/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 0;
    }

    # MinIO Console
    location /minio-ui/ {
        proxy_pass http://minio_console/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        return 200 '{"argo":"/argo/","minio":"/minio/","minio-ui":"/minio-ui/"}';
        add_header Content-Type application/json;
    }
}
