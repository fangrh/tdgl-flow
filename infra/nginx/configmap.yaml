apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: tdgl
data:
  nginx.conf: |
    server {
        listen 80;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ @proxy;
        }

        location @proxy {
            return 404;
        }

        location /tdgl/ {
            proxy_pass http://data-viewer.tdgl.svc.cluster.local/;
            proxy_redirect / $scheme://$http_host/tdgl/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /argocd {
            proxy_pass http://argocd-server.argocd.svc.cluster.local;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "";
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            sub_filter '<base href="/">' '<base href="/argocd/">';
            sub_filter_once on;
            sub_filter_types text/html;
        }

        location /workflows/ {
            proxy_pass http://argo-workflows-server.argo.svc.cluster.local:2746/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>TDGL Platform</title>
        <style>
            body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; }
            h1 { font-size: 24px; }
            ul { list-style: none; padding: 0; }
            li { margin: 12px 0; }
            a { display: block; padding: 16px; background: #f5f5f5; border-radius: 8px; text-decoration: none; color: #333; font-size: 16px; }
            a:hover { background: #e0e0e0; }
            .tag { color: #888; font-size: 13px; margin-left: 8px; }
        </style>
    </head>
    <body>
        <h1>TDGL Platform</h1>
        <ul>
            <li><a href="/tdgl/">TDGL Data Viewer <span class="tag">heatmap viewer</span></a></li>
            <li><a href="/argocd/">ArgoCD <span class="tag">gitops dashboard</span></a></li>
            <li><a href="/workflows/">Argo Workflows <span class="tag">workflow ui</span></a></li>
        </ul>
    </body>
    </html>
