apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: data-viewer
  namespace: tdgl
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: tdgl.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: data-viewer
                port:
                  number: 80