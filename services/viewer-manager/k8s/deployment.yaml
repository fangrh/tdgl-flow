apiVersion: apps/v1
kind: Deployment
metadata:
  name: viewer-manager
  namespace: tdgl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: viewer-manager
  template:
    metadata:
      labels:
        app: viewer-manager
    spec:
      serviceAccountName: viewer-manager
      containers:
        - name: viewer-manager
          image: ghcr.io/fangrh/viewer-manager:df0f232
          ports:
            - containerPort: 8000
          env:
            - name: VIEWER_MANAGER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: data-viewer-config
                  key: TDGL_DATABASE_URL
            - name: VIEWER_MANAGER_VIEWER_IMAGE
              value: "ghcr.io/fangrh/tdgl-data-viewer:latest"
            - name: VIEWER_MANAGER_K8S_NAMESPACE
              value: "tdgl"
            - name: VIEWER_MANAGER_BASE_URL
              value: "http://gateway.tdgl.svc.cluster.local"
          livenessProbe:
            httpGet:
              path: /api/viewer-sessions
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/viewer-sessions
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      imagePullSecrets:
        - name: ghcr-secret