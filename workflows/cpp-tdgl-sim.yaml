apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cpp-tdgl-sim
  namespace: tdgl
spec:
  serviceAccountName: argo-workflow
  entrypoint: simulation-pipeline
  arguments:
    parameters:
      - name: run-id
        value: ""
      - name: data-service-url
        value: "http://data-viewer.tdgl.svc.cluster.local"
      - name: image
        value: "ghcr.io/fangrh/cpp-tdgl-runner:dev"
      - name: device-params-json
        value: "{}"
      - name: timing-params-json
        value: "{}"
      - name: solver-options-json
        value: "{}"
      - name: cpu
        value: "2"
      - name: memory
        value: "4Gi"
      - name: dev-mode
        value: "false"

  templates:
    - name: simulation-pipeline
      steps:
        - - name: build-device
            template: build-device-step
        - - name: build-timing
            template: build-timing-step
        - - name: simulate
            template: simulate-step

    - name: build-device-step
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Always
        command: [python, /app/build_device.py]
        env:
          - name: RUN_ID
            value: "{{workflow.parameters.run-id}}"
          - name: DEVICE_PARAMS
            value: "{{workflow.parameters.device-params-json}}"
          - name: DATA_DIR
            value: "/data"
        volumeMounts:
          - name: run-data
            mountPath: /data
          - name: cpp-tdgl-src
            mountPath: /src/cpp-tdgl
          - name: tdgl-workflow-src
            mountPath: /app/vendor/tdgl_workflow

    - name: build-timing-step
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Always
        command: [python, /app/build_timing.py]
        env:
          - name: RUN_ID
            value: "{{workflow.parameters.run-id}}"
          - name: TIMING_PARAMS
            value: "{{workflow.parameters.timing-params-json}}"
          - name: DATA_DIR
            value: "/data"
        volumeMounts:
          - name: run-data
            mountPath: /data
          - name: cpp-tdgl-src
            mountPath: /src/cpp-tdgl
          - name: tdgl-workflow-src
            mountPath: /app/vendor/tdgl_workflow

    - name: simulate-step
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Always
        command: [python, /app/runner.py]
        env:
          - name: TDGL_RUN_ID
            value: "{{workflow.parameters.run-id}}"
          - name: TDGL_DATA_SERVICE_URL
            value: "{{workflow.parameters.data-service-url}}"
          - name: DATA_DIR
            value: "/data"
          - name: SOLVER_OPTIONS
            value: "{{workflow.parameters.solver-options-json}}"
          - name: DEV_MODE
            value: "{{workflow.parameters.dev-mode}}"
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        volumeMounts:
          - name: run-data
            mountPath: /data
          - name: cpp-tdgl-src
            mountPath: /src/cpp-tdgl
          - name: tdgl-workflow-src
            mountPath: /app/vendor/tdgl_workflow

  volumes:
    - name: cpp-tdgl-src
      hostPath:
        path: /mnt/c/Users/photo/Photonics_Group/Ruihuan/kubeflow-tdgl/bind/cpp-tdgl
        type: Directory
    - name: tdgl-workflow-src
      hostPath:
        path: /mnt/c/Users/photo/Photonics_Group/Ruihuan/kubeflow-tdgl/bind/tdgl_workflow
        type: Directory

  volumeClaimTemplates:
    - metadata:
        name: run-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
