# Adapt: name, image, ports, env vars, volume mounts, resource limits
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-service
  namespace: tdgl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-service
  template:
    metadata:
      labels:
        app: my-service
    spec:
      containers:
        - name: my-service
          image: ghcr.io/fangrh/tdgl-my-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: TDGL_DATA_SERVICE_URL
              value: "http://data-viewer.tdgl.svc.cluster.local"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      imagePullSecrets:
        - name: ghcr-secret