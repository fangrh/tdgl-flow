name: Build and Push Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed paths
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi
          CHANGES=$(git diff --name-only "$BASE" HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          echo "$CHANGES"
          PY_RUNNER=false
          echo "$CHANGES" | grep -qE "^(services/py-tdgl-runner/(Dockerfile|build_device.py|build_timing.py|runner.py)|src/tdgl_sdk/|src/tdgl_workflow/|pyproject.toml)" && PY_RUNNER=true
          echo "$CHANGES" | grep -qE "^src/tdgl_sdk/" && PY_RUNNER=true
          echo "$CHANGES" | grep -qE "^src/tdgl_workflow/" && PY_RUNNER=true
          echo "build_py_runner=$PY_RUNNER" >> "$GITHUB_OUTPUT"
          echo "Py-runner changed: $PY_RUNNER"

      - name: Log in to GHCR
        if: steps.changes.outputs.build_py_runner == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push py-tdgl-runner
        if: steps.changes.outputs.build_py_runner == 'true'
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker build -f services/py-tdgl-runner/Dockerfile \
            -t ghcr.io/fangrh/py-tdgl-runner:$SHA \
            .
          docker push ghcr.io/fangrh/py-tdgl-runner:$SHA

      - name: Update manifest tags and commit
        if: github.ref == 'refs/heads/main' && steps.changes.outputs.build_py_runner == 'true'
        run: |
          SHA=$(git rev-parse --short HEAD)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s|ghcr.io/fangrh/py-tdgl-runner:[^\"]*|ghcr.io/fangrh/py-tdgl-runner:$SHA|g" services/py-tdgl-runner/k8s/workflowtemplate.yaml
          sed -i "s|ghcr.io/fangrh/py-tdgl-runner:[^\"]*|ghcr.io/fangrh/py-tdgl-runner:$SHA|g" workflows/rectangle-device-builder.yaml
          echo "Updated py-tdgl-runner tag to $SHA"
          git add services/py-tdgl-runner/k8s/workflowtemplate.yaml workflows/rectangle-device-builder.yaml
          git diff --cached --quiet || git commit -m "ci: update image tags to $SHA"
          git push
