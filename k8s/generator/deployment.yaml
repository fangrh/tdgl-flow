apiVersion: apps/v1
kind: Deployment
metadata:
  name: generator
  namespace: tdgl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: generator
  template:
    metadata:
      labels:
        app: generator
    spec:
      containers:
        - name: generator
          image: kubeflow-tdgl-data:latest
          ports:
            - containerPort: 8001
          env:
            - name: TDGL_DATA_SERVICE_URL
              value: "http://data-service.tdgl.svc.cluster.local"
          command: ["uvicorn", "tdgl_generator.app:create_app", "--factory", "--host", "0.0.0.0", "--port", "8001"]
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"